services:
  openbao:
    image: openbao/openbao:2.1
    container_name: openbao
    network_mode: host
    cap_add:
      - IPC_LOCK
    env_file: .env
    user: root
    volumes:
      - ./openbao-entrypoint.sh:/openbao-entrypoint.sh:ro
      - openbao-data:/openbao/data
    entrypoint: ["/openbao-entrypoint.sh"]
    restart: unless-stopped

  caddy:
    image: ghcr.io/tailscale/caddy-tailscale:main
    container_name: caddy
    network_mode: host
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    depends_on:
      - openbao
    restart: unless-stopped

volumes:
  openbao-data:
  caddy-data:
  caddy-config:
